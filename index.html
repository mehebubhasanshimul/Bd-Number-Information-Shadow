<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Information CTH | SHADOW JOKER</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #00d2ff;
            --secondary: #3a7bd5;
            --hack-green: #00ff00;
            --bg-hack: url('https://media.giphy.com/media/QKDpE67Rc7rpjBmQPj/giphy.gif');
            --card-bg: rgba(0, 0, 0, 0.85);
            --glow: 0 0 15px rgba(0, 210, 255, 0.6);
            --hack-glow: 0 0 10px rgba(0, 255, 0, 0.6);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body {
            background-image: var(--bg-hack);
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 480px;
            padding: 30px;
            background: var(--card-bg);
            border-radius: 28px;
            border: 2px solid #1a2a4a;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8);
            text-align: center;
            backdrop-filter: blur(10px);
            animation: containerGlow 4s infinite alternate;
        }

        @keyframes containerGlow {
            0% { border-color: #1a2a4a; }
            100% { border-color: var(--primary); }
        }

        .logo-gif {
            width: 90px; height: 90px;
            border-radius: 50%;
            border: 3px solid var(--primary);
            margin-bottom: 15px;
            box-shadow: var(--glow);
        }

        h1 {
            font-size: 1.6rem;
            background: linear-gradient(45deg, #00d2ff, #00ff00, #ffcc00, #00d2ff);
            background-size: 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            animation: gradientText 6s infinite;
        }

        @keyframes gradientText { 0%{background-position:0%} 100%{background-position:100%} }

        .credit { color: #ffcc00; font-size: 0.8rem; margin-bottom: 20px; display: block; }

        input {
            width: 100%; padding: 15px;
            background: rgba(0,0,0,0.6);
            border: 2px solid #2d3748;
            border-radius: 12px;
            color: #fff;
            text-align: center;
            margin-bottom: 15px;
            outline: none;
        }

        input:focus { border-color: var(--hack-green); box-shadow: var(--hack-glow); }

        button {
            width: 100%; padding: 15px;
            background: linear-gradient(45deg, var(--primary), var(--hack-green));
            border: none; border-radius: 12px;
            font-weight: bold; cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
        }

        button:hover { transform: scale(1.02); }

        .profile-img {
            width: 80px; height: 80px;
            border-radius: 50%;
            border: 2px solid var(--hack-green);
            margin-bottom: 15px;
            display: none; 
        }

        #result {
            display: none;
            margin-top: 25px;
            text-align: left;
            background: rgba(255,255,255,0.05);
            padding: 20px;
            border-radius: 15px;
            border-left: 4px solid var(--primary);
        }

        .row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .label { color: #94a3b8; font-size: 0.85rem; }
        .val { color: #fff; font-weight: bold; }
        .val.name { color: var(--hack-green); }

        .social-row { display: flex; justify-content: center; gap: 20px; margin-top: 15px; }
        .social-link { font-size: 1.5rem; transition: 0.3s; }
        .social-link:hover { transform: translateY(-3px); }

        .loader-gif { display: none; width: 50px; margin: 15px auto; }
    </style>
</head>
<body>

    <div class="container">
        <img src="https://media.giphy.com/media/1is4K4y0oWyyGnWTSh/giphy.gif" alt="Logo" class="logo-gif">
        <h1>Number Information</h1>
        <span class="credit">Credit: SHADOW JOKER CTH</span>

        <input type="text" id="phoneInput" placeholder="Enter BD Number (e.g. 017...)">
        <button onclick="lookupNumber()" id="btnSubmit">Scan Number</button>

        <img src="https://media.giphy.com/media/QKDpE67Rc7rpjBmQPj/giphy.gif" class="loader-gif" id="loader">

        <div id="result">
            <div style="text-align: center;">
                <img id="resPhoto" src="" class="profile-img">
            </div>
            <div class="row"><span class="label">Name:</span> <span id="resName" class="val name"></span></div>
            <div class="row"><span class="label">Number:</span> <span id="resNum" class="val"></span></div>
            <div class="row"><span class="label">Address:</span> <span id="resAddr" class="val"></span></div>
            
            <div class="social-row">
                <a id="waLink" href="#" target="_blank" class="social-link" style="color: #25d366;"><i class="fa-brands fa-whatsapp"></i></a>
                <a id="tgLink" href="#" target="_blank" class="social-link" style="color: #24A1DE;"><i class="fa-brands fa-telegram"></i></a>
            </div>
        </div>

        <a href="https://t.me/SHADOW_JOKER_CTH" target="_blank" style="display:block; margin-top:20px; color:var(--primary); text-decoration:none; font-size:0.8rem;">
            <i class="fa-brands fa-telegram"></i> Contact Admin
        </a>
    </div>

    <script>
        async function lookupNumber() {
            let num = document.getElementById('phoneInput').value.trim();
            const btn = document.getElementById('btnSubmit');
            const loader = document.getElementById('loader');
            const resultDiv = document.getElementById('result');
            const resPhoto = document.getElementById('resPhoto');

            if (!num) return alert("দয়া করে একটি নাম্বার দিন!");

            // বাংলাদেশী কান্ট্রি কোড ও নম্বর ফিল্টারিং
            let dialingCode = "880"; 
            let cleanNum = num.replace(/\D/g, ''); 

            if (cleanNum.startsWith('880')) {
                cleanNum = cleanNum.substring(3);
            } else if (cleanNum.startsWith('0')) {
                cleanNum = cleanNum.substring(1);
            }

            if (cleanNum.length !== 10) {
                return alert("দয়া করে একটি সঠিক ১১ ডিজিটের বাংলাদেশী নাম্বার দিন!");
            }

            loader.style.display = "block";
            resultDiv.style.display = "none";
            btn.disabled = true;

            try {
                const response = await fetch('/api/search', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone: cleanNum, dialingCode: dialingCode })
                });
                
                const resData = await response.json();

                // নতুন এপিআই-এর JSON ফরম্যাট অনুযায়ী ডাটা রিড করা
                if (resData && resData.data && resData.error === 0) {
                    const info = resData.data;
                    
                    // নাম সেট করা
                    document.getElementById('resName').innerText = info.basicInfo?.name?.fullName || "No Name Found";
                    
                    // ফোন নম্বর
                    document.getElementById('resNum').innerText = info.phoneInfo?.e164Format || ("+880" + cleanNum);
                    
                    // ঠিকানা জেনারেট করা
                    const city = info.addressInfo?.city || "";
                    const country = info.addressInfo?.countryCode || "BD";
                    document.getElementById('resAddr').innerText = city ? `${city}, ${country}` : "Bangladesh";

                    // প্রোফাইল ফটো সেট করা
                    if (info.basicInfo?.image) {
                        resPhoto.src = info.basicInfo.image;
                        resPhoto.style.display = "inline-block";
                    } else {
                        resPhoto.style.display = "none";
                    }

                    // সোশ্যাল লিঙ্ক জেনারেশন
                    document.getElementById('waLink').href = `https://wa.me/880${cleanNum}`;
                    document.getElementById('tgLink').href = `https://t.me/SHADOW_JOKER_CTH`;

                    resultDiv.style.display = "block";
                } else {
                    alert("কোনো তথ্য পাওয়া যায়নি অথবা এপিআই কোটা শেষ!");
                }
            } catch (err) {
                alert("সার্ভার কানেকশন এরর!");
                console.error(err);
            } finally {
                loader.style.display = "none";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
